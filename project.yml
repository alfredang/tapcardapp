name: Tapcard
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "GU9WTSTX9M"   # Tertiary Infotech (paid) — same team as Tertiary Scanner / RunTrack GPS
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Tapcard:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tapcard
    info:
      path: Tapcard/Info.plist
      properties:
        CFBundleDisplayName: Tapcard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Allow camera access to scan business cards."
        NSPhotoLibraryUsageDescription: "Allow photo access to import a business card image."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.tapcard
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
